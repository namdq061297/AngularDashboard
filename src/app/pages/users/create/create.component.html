<section class="main-container">
  <div class="page-header">
    <h2>{{ isEditMode ? 'Edit User' : 'Add New User' }}</h2>
  </div>

  <form class="user-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="form-row">
      <app-form-field class="form-field" controlName="first_name" label="First Name" [required]="true" placeholder="John" [errors]="{ required: 'First name is required.' }"></app-form-field>

      <app-form-field class="form-field" controlName="last_name" label="Last Name" [required]="true" placeholder="Doe" [errors]="{ required: 'Last name is required.' }"></app-form-field>
    </div>

    <div class="form-row">
      <app-form-field
        class="form-field"
        controlName="email"
        label="Email"
        type="email"
        [required]="true"
        placeholder="john.doe@example.com"
        [errors]="{ required: 'Email is required.', email: 'Please enter a valid email.' }"
      ></app-form-field>

      <app-form-field
        class="form-field"
        controlName="phone"
        label="Phone"
        type="tel"
        placeholder="0900000000"
        [maxlength]="10"
        [errors]="{ maxlength: 'Phone must be at most 10 digits.', pattern: 'Phone must contain digits only.', startsWithZero: 'Phone must start with 0.' }"
      ></app-form-field>
    </div>

    <div class="form-row">
      <app-form-field class="form-field" controlName="city" label="City" placeholder="Ho Chi Minh"></app-form-field>

      <app-form-field class="form-field" controlName="country" label="Country" type="select">
        <option value="">Select country</option>
        @for (country of countryOptions; track country) {
          <option [value]="country">{{ country }}</option>
        }
      </app-form-field>
    </div>

    <div class="form-row">
      <app-form-field class="form-field form-field--full" controlName="avatar_url" label="Avatar URL" type="url" placeholder="https://example.com/avatar.png"></app-form-field>
    </div>

    <div class="form-row">
      <div class="form-field form-field--full">
        <label for="avatar_file">Or Pick Avatar From Device</label>
        <input id="avatar_file" type="file" accept="image/*" (change)="onAvatarFileChange($event)" />
        @if (avatarFileError) {
          <span class="field-error">{{ avatarFileError }}</span>
        }

        <div class="avatar-preview">
          <img [src]="avatarPreviewUrl" alt="Avatar preview" (error)="onAvatarPreviewError()" />
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-submit" [disabled]="isSubmitting || isLoadingUser">
        {{ isSubmitting ? 'Saving...' : isEditMode ? 'Update User' : 'Save User' }}
      </button>
    </div>
  </form>
</section>
