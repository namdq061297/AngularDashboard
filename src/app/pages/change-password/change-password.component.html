<section class="main-container">
  <div class="page-header">
    <h2>Change Password</h2>
  </div>

  <form class="change-password-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <app-form-field
      class="form-field"
      controlName="currentPassword"
      label="Current Password"
      type="password"
      [required]="true"
      placeholder="Enter current password"
      [errors]="{ required: 'Current password is required.' }"
    ></app-form-field>

    <app-form-field
      class="form-field"
      controlName="newPassword"
      label="New Password"
      type="password"
      [required]="true"
      placeholder="Enter new password"
      [errors]="{ required: 'New password is required (min 8 chars).', minlength: 'New password is required (min 8 chars).' }"
    ></app-form-field>

    <app-form-field
      class="form-field"
      controlName="confirmPassword"
      label="Confirm Password"
      type="password"
      [required]="true"
      placeholder="Confirm new password"
      [errors]="{ required: 'Confirm password is required (min 8 chars).', minlength: 'Confirm password is required (min 8 chars).' }"
    ></app-form-field>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Updating...' : 'Update Password' }}
      </button>
    </div>
  </form>
</section>
