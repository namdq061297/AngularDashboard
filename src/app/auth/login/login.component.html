<div class="login">
  <div class="login-box">
    <h2 translate>Login</h2>
    <form (ngSubmit)="login()" #loginForm="ngForm">
      <div class="input-field">
        <input [(ngModel)]="email" name="email" required type="email" />
        <label translate>Email</label>
      </div>
      <div class="input-field">
        <input [(ngModel)]="password" name="password" required type="password" />
        <label translate>Password</label>
      </div>
      <button [disabled]="isLoading" type="submit">
        {{ isLoading ? ('Loading' | translate) : ('Login' | translate) }}
      </button>
    </form>
  </div>
</div>

<div class="lang-selector">
  <app-language-selector [openAbove]="true"></app-language-selector>
</div>
